; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t3-s3]
platform = espressif32
board = lilygo-t3-s3
framework = arduino
; Libraries are vendored under this project's lib/ folder (GAACE, arduino-timer,
; TFT_eSPI) so the build is self-contained and no longer depends on the shared
; MIPS Arduino libraries directory.